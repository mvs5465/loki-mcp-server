name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    uses: mvs5465-test/.github/.github/workflows/claude-pr-review.yml@main
    secrets: inherit

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true
